<!DOCTYPE html>
<html lang="en" style="color-scheme: dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#24302c" />
  <title>Contact SoundIn &mdash; Scottish Digital Agency</title>
  <meta name="description" content="Get in touch with SoundIn. Based in the Scottish Highlands &mdash; web development, venue software, event production, lighting, and social media management." />

  <!-- Canonical -->
  <link rel="canonical" href="https://soundin.scot/contact" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://soundin.scot/contact" />
  <meta property="og:site_name" content="SoundIn" />
  <meta property="og:title" content="Contact SoundIn &mdash; Scottish Digital Agency" />
  <meta property="og:description" content="Get in touch with SoundIn. Based in the Scottish Highlands &mdash; web development, venue software, event production, lighting, and social media management." />
  <meta property="og:image" content="https://soundin.scot/og-image.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="en_GB" />

  <!-- Twitter/X Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Contact SoundIn &mdash; Scottish Digital Agency" />
  <meta name="twitter:description" content="Get in touch with SoundIn. Based in the Scottish Highlands &mdash; web development, venue software, event production, lighting, and social media management." />
  <meta name="twitter:image" content="https://soundin.scot/og-image.jpg" />

  <!-- Geo -->
  <meta name="geo.region" content="GB-SCT" />
  <meta name="geo.placename" content="Scottish Highlands" />

  <!-- Fonts: non-blocking load -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" href="fonts/negara-serif-hairline-italic.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@400;700;900&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@400;700;900&display=swap" /></noscript>

  <!-- Stylesheet -->
  <link rel="stylesheet" href="styles.css" />

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ContactPage",
    "@id": "https://soundin.scot/contact#webpage",
    "url": "https://soundin.scot/contact",
    "name": "Contact SoundIn",
    "isPartOf": { "@id": "https://soundin.scot/#organization" }
  }
  </script>
</head>
<body>

<a href="#contact-form" class="sr-only skip-link">Skip to contact form</a>

<!-- NAV -->
<nav class="nav">
  <a href="/" class="logo" aria-label="SoundIn &mdash; return to homepage"><span class="logo-s">Sound</span><span class="logo-i">In</span></a>
  <ul class="nav-links">
    <li class="nav-hide-mobile"><a href="/#practices">What We Do</a></li>
    <li class="nav-hide-mobile"><a href="/vision">Our Story</a></li>
    <li><a href="/contact" aria-current="page">Say Hello</a></li>
  </ul>
</nav>

<!-- CONTACT -->
<section class="contact page-top" style="min-height: 100vh; min-height: 100dvh;">
  <div>
    <h1>Tell me what you&rsquo;re working on</h1>
    <form id="contact-form">
      <div class="field-group">
        <label for="contact-name" class="field-label">Name</label>
        <input id="contact-name" name="name" class="contact-field" type="text" autocomplete="name" required />
      </div>
      <div class="field-group">
        <label for="contact-email" class="field-label">Email</label>
        <input id="contact-email" name="email" class="contact-field" type="email" autocomplete="email" spellcheck="false" required />
      </div>
      <div class="field-group">
        <label for="contact-company" class="field-label">Company</label>
        <input id="contact-company" name="company" class="contact-field" type="text" autocomplete="organization" />
      </div>
      <div class="field-group">
        <label for="contact-message" class="field-label">Message</label>
        <textarea id="contact-message" name="message" class="contact-field" rows="4" required></textarea>
      </div>
      <button class="contact-submit" type="submit">Send Message</button>
      <div id="form-status" role="status" aria-live="polite"></div>
    </form>
  </div>
  <div class="contact-right">
    <dl>
      <div class="contact-info-group">
        <dt class="contact-info-label">General</dt>
        <dd class="contact-info-val"><a href="mailto:hello@soundin.scot">hello@soundin.scot</a></dd>
      </div>
      <div class="contact-info-group">
        <dt class="contact-info-label">Location</dt>
        <dd class="contact-info-val">Scottish Highlands, UK</dd>
      </div>
      <div class="contact-info-group">
        <dt class="contact-info-label">Socials</dt>
        <dd class="contact-info-val"><a href="#">LinkedIn</a></dd>
      </div>
    </dl>
  </div>
</section>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-wordmark" aria-hidden="true">SoundIn</div>
  <div class="footer-bar">
    <span class="footer-bar-item">2026 &copy; SoundIn</span>
    <div class="footer-bar-links">
      <a href="/contact" class="footer-bar-item">Say Hello</a>
      <a href="#" class="footer-bar-item">LinkedIn</a>
      <a href="/privacy" class="footer-bar-item">Privacy</a>
    </div>
    <a href="https://find-and-update.company-information.service.gov.uk/company/SC850719" rel="noopener noreferrer" target="_blank" class="footer-bar-item">SC850719</a>
  </div>
</footer>

<script>
// Nav scroll state
const nav = document.querySelector('.nav');
let ticking = false;
window.addEventListener('scroll', () => {
  if (!ticking) {
    window.requestAnimationFrame(() => {
      nav.classList.toggle('scrolled', window.scrollY > 40);
      ticking = false;
    });
    ticking = true;
  }
}, { passive: true });

// Contact form handler
document.getElementById('contact-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = e.target.querySelector('.contact-submit');
  const status = document.getElementById('form-status');
  btn.textContent = 'Sending\u2026';
  btn.disabled = true;

  try {
    // Replace with real endpoint when ready
    await new Promise(resolve => setTimeout(resolve, 1200));
    btn.textContent = 'Sent';
    status.textContent = "We\u2019ll be in touch.";
    btn.style.borderColor = 'rgba(231,223,217,0.3)';
  } catch {
    btn.textContent = 'Send Message';
    btn.disabled = false;
    status.textContent = 'Something went wrong \u2014 email us at hello@soundin.scot';
  }
});

// Auto-resize textarea
const ta = document.getElementById('contact-message');
ta.addEventListener('input', () => {
  ta.style.height = 'auto';
  ta.style.height = ta.scrollHeight + 'px';
});
</script>

</body>
</html>
